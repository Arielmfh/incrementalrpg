{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Incremental RPG</title>
  <link rel="stylesheet" href="{% static 'css/game.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">⚔️ Incremental RPG</div>
    <div class="auth-sub">Enter the realm of adventure</div>

    {% if messages %}
      {% for message in messages %}
        <div class="message {{ message.tags }}" style="margin-bottom:0.8rem">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem">Login</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.9rem;color:var(--text-muted)">
      New adventurer? <a href="{% url 'game:register' %}">Create account</a>
    </p>
  </div>
</div>
</body>
</html>
